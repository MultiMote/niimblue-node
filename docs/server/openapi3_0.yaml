openapi: 3.0.3
info:
  title: niimblue-node server
  version: "1.0"

servers:
  - url: http://localhost:5000
    description: Local server

paths:
  /connect:
    post:
      summary: Connect to the printer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - transport
                - address
              properties:
                transport:
                  type: string
                  enum:
                    - ble
                    - serial
                address:
                  type: string
            examples:
              Serial:
                value:
                  transport: "serial"
                  address: "COM8"
              BLE:
                value:
                  transport: "ble"
                  address: "26:03:03:c3:f9:11"
      responses:
        "200":
            description: Result
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/SimpleResponse"
        "500":
            description: Connection failure

  /disconnect:
    post:
      summary: Disconnect from the printer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
            description: Result
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/SimpleResponse"
        "500":
            description: Connection failure

  /connected:
    get:
      summary: Check the printer connection status
      responses:
        "200":
          description: Connection status
          content:
            application/json:
              schema:
                type: object
                properties:
                  connected:
                    type: boolean

  /info:
    get:
      summary: Check the printer info
      responses:
        "200":
          description: Connection status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrinterInfo'

  /rfid:
    get:
      summary: Check the printer RFID info
      responses:
        "200":
          description: Connection status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrinterRfidInfo'

  /print:
    post:
      summary: Print image(s)
      description: >
        Prints one or more images to the printer. This endpoint supports 
        two payload structures:

        1. Single-Image Mode: Supply a single image using the root-level 
        `imageUrl` or `imageBase64` fields.

        2. Multi-Page Mode: Use the `pages` array to send multiple distinct images 
        in a single print job.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrintOptions"
            examples:
              Print base64 image:
                value:
                  printDirection: top
                  imageBase64: ""

              Print from url:
                value:
                  quantity: 1
                  printDirection: top
                  printTask: B1
                  imageUrl: https://i.imgur.com/TzzVlc4.png
                  labelWidth: 344
                  labelHeight: 200
                  imagePosition: center
                  imageFit: contain
                  threshold: 128
                  density: 3

              Print multiple pages:
                value:
                  printDirection: left
                  printTask: B1
                  density: 3
                  labelType: 1
                  quantity: 1
                  pages:
                    - imageUrl: https://i.imgur.com/TzzVlc4.png
                      quantity: 2
                    - imageBase64: "iVBORw0KGgoAAAANSUhEUgAAAVgAAADICAAAAACIFqZrAAAA..."
                      quantity: 1

      responses:
        "200":
            description: Success
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/SimpleResponse"

  /scan:
    post:
      summary: Scan for devices
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - transport
              properties:
                transport:
                  type: string
                  enum:
                    - ble
                    - serial
      responses:
        "200":
          description: Device list
          content:
            application/json:
              schema:
                type: object
                properties:
                  devices:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        address:
                          type: string
                      required:
                        - name
                        - address
                additionalProperties: false
                required:
                  - devices

components:
  schemas:
    SimpleResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    PageObject:
      type: object
      description: A single page to be printed. Exactly one of imageUrl or imageBase64 must be provided.
      properties:
        imageBase64:
          type: string
          format: byte
          description: Base64-encoded image data.
        imageUrl:
          type: string
          format: uri
          description: Publicly accessible image URL.
        quantity:
          type: number
          minimum: 1
          description: How many copies of this page to print.
      required: []

    PrintOptions:
      type: object
      description: >
        Print parameters. You must provide exactly one of:
          - `imageUrl` or `imageBase64`, or
          - `pages` (multi-page mode).
      properties:
        printDirection:
          type: string
          enum: ["left", "top"]
          default: left

        printTask:
          type: string
          example: B1
          description: Printer task type (if omitted, auto-detected).

        quantity:
          type: number
          minimum: 1
          default: 1
          description: Global quantity applied to all pages unless overridden per page.

        labelType:
          type: number
          minimum: 1
          default: 1

        density:
          type: number
          minimum: 1
          default: 3

        imageBase64:
          type: string
          format: byte
          description: |
            Image as base64-encoded string. Use either this or `imageUrl`.

        imageUrl:
          type: string
          format: uri
          description: |
            Image URL. Use either this or `imageBase64`.

        pages:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PageObject"
          description: |
            Array of pages to print. Each page requires exactly one image source
            (`imageUrl` or `imageBase64`) and can have its own `quantity`.
            Cannot be combined with `imageUrl`/`imageBase64` fields.

        labelWidth:
          description: Label width in pixels (if omitted, the image's original width is used).
          type: number
          minimum: 8

        labelHeight:
          description: Label height in pixels (if omitted, the image's original height is used).
          type: number
          minimum: 8

        threshold:
          type: number
          minimum: 1
          maximum: 255
          default: 128

        imagePosition:
          type: string
          enum: ["center", "centre", "top", "right top", "right", "right bottom", "bottom", "left bottom", "left", "left top"]
          default: center
          description: See [sharp resize options.position](https://sharp.pixelplumbing.com/api-resize)

        imageFit:
          type: string
          enum: ["contain", "cover", "fill", "inside", "outside"]
          default: contain
          description: See [sharp resize options.fit](https://sharp.pixelplumbing.com/api-resize)

        waitUntilFinished:
          type: boolean
          default: true
          description: If false, the HTTP response is returned immediately while the print job runs in the background.

    PrinterInfo:
      type: object
      properties:
        printerInfo:
          type: object
          properties:
            connectResult:
              type: integer
            protocolVersion:
              type: integer
            modelId:
              type: integer
            serial:
              type: string
            mac:
              type: string
            charge:
              type: integer
            autoShutdownTime:
              type: integer
            labelType:
              type: integer
            hardwareVersion:
              type: string
            softwareVersion:
              type: string
          additionalProperties: false
        modelMetadata:
          type: object
          properties:
            model:
              type: string
            id:
              type: array
              items:
                type: integer
            dpi:
              type: integer
            printDirection:
              type: string
            printheadPixels:
              type: integer
            paperTypes:
              type: array
              items:
                type: integer
            densityMin:
              type: integer
            densityMax:
              type: integer
            densityDefault:
              type: integer
          additionalProperties: false
        detectedPrintTask:
          type: string
      additionalProperties: false
      required:
        - printerInfo
        - modelMetadata
        - detectedPrintTask

    PrinterRfidInfo:
      type: object
      required:
        - paperRfidInfo
      properties:
        paperRfidInfo:
          type: object
          required:
            - tagPresent
            - uuid
            - barCode
            - serialNumber
            - allPaper
            - usedPaper
            - consumablesType
          properties:
            tagPresent:
              type: boolean
            uuid:
              type: string
            barCode:
              type: string
            serialNumber:
              type: string
            allPaper:
              type: integer
            usedPaper:
              type: integer
            consumablesType:
              type: integer
        ribbonRfidInfo:
          type: object
          required:
            - tagPresent
            - uuid
            - barCode
            - serialNumber
            - allPaper
            - usedPaper
            - consumablesType
          properties:
            tagPresent:
              type: boolean
            uuid:
              type: string
            barCode:
              type: string
            serialNumber:
              type: string
            allPaper:
              type: integer
            usedPaper:
              type: integer
            consumablesType:
              type: integer
